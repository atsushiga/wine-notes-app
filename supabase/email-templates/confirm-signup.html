<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WINE NOTE のアカウント確認</title>
  </head>
  <body style="margin:0;background:#f6f4ef;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
      <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;padding:28px;">
        <p style="margin:0 0 18px;font-size:14px;line-height:1.7;color:#4b5563;">
          WINE NOTE のアカウント確認リンクをお送りします。
        </p>

        <p style="margin:0 0 24px;font-size:14px;line-height:1.7;color:#4b5563;">
          下のボタンからメールアドレスの確認を完了し、パスワード設定を続けてください。
        </p>

        <p style="margin:0 0 24px;">
          <a
            href="{{ .ConfirmationURL }}"
            style="display:inline-block;border-radius:6px;background:#7f1d1d;color:#ffffff;font-size:14px;font-weight:600;line-height:1;text-decoration:none;padding:13px 18px;"
          >
            アカウントを確認する
          </a>
        </p>

        <p style="margin:0 0 8px;font-size:12px;line-height:1.7;color:#6b7280;">
          ボタンが開けない場合は、次の URL をブラウザに貼り付けてください。
        </p>
        <p style="margin:0 0 24px;font-size:12px;line-height:1.7;word-break:break-all;color:#6b7280;">
          {{ .ConfirmationURL }}
        </p>

        <p style="margin:0;font-size:12px;line-height:1.7;color:#6b7280;">
          このメールに心当たりがない場合は、何もせず破棄してください。
        </p>
      </div>
    </div>
  </body>
</html>
